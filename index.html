<!DOCTYPE html>
<html lang="es">
<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  >

  <meta
    name="theme-color"
    content="#0FA958"
  >

  <meta
    name="description"
    content="Sistema Integral de Gestión Educativa Institucional"
  >

  <title>SIGEI-RPB</title>

  <link
    rel="manifest"
    href="./manifest.json"
  >

  <style>

    :root {
      --color-principal: #0FA958;
      --color-secundario: #FFD600;
      --color-fondo: #FFFFFF;
      --color-texto: #222222;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--color-fondo);
      color: var(--color-texto);
    }

    body {
      min-height: 100vh;
    }

    #loader {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .loader-contenido {
      text-align: center;
    }

    .loader-circulo {
      width: 48px;
      height: 48px;
      margin: 0 auto 16px;
      border: 5px solid #dddddd;
      border-top-color: var(--color-principal);
      border-radius: 50%;
      animation: girar 0.9s linear infinite;
    }

    .loader-texto {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
    }

    #app {
      display: none;
      min-height: 100vh;
    }

    @keyframes girar {
      to {
        transform: rotate(360deg);
      }
    }

  </style>

</head>

<body>

  <div
    id="loader"
    role="status"
    aria-live="polite"
  >
    <div class="loader-contenido">

      <div
        class="loader-circulo"
        aria-hidden="true"
      ></div>

      <p class="loader-texto">
        Cargando SIGEI-RPB...
      </p>

    </div>
  </div>


  <main
    id="app"
    aria-hidden="true"
  >
  </main>


  <script>

    console.log(
      "SIGEI-RPB: motor de arranque cargado."
    );

  </script>

</body>
</html>
