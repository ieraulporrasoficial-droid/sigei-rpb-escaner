<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Escáner QR SIGEI</title>

  <script
    src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"
  ></script>

  <style>

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 16px;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #ffffff;
    }

    .contenedor {
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
    }

    .tarjeta {
      background: #111827;
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 10px;
      text-align: center;
      font-size: 25px;
    }

    .subtitulo {
      margin: 0 0 18px;
      text-align: center;
      color: #cbd5e1;
      line-height: 1.5;
    }

    #lectorQr {
      width: 100%;
      min-height: 260px;
      margin: 16px auto;
      overflow: hidden;
      border-radius: 14px;
      background: #000000;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      background: #22c55e;
      color: #052e16;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .acciones-finales {

  display: none;

  gap: 12px;

  margin-top: 16px;

}

.acciones-finales.visible {

  display: grid;

}

.boton-volver-portal {

  background: #2563eb;

  color: #ffffff;

}

.boton-cerrar-sesion {

  background: #dc2626;

  color: #ffffff;

}

    .estado,
    .datos {
      margin-top: 16px;
      padding: 13px;
      border-radius: 12px;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .datos {
      background: #1e293b;
      color: #cbd5e1;
    }

    .datos strong {
      color: #ffffff;
    }

    .estado.info {
      background: #1e3a5f;
    }

    .estado.exito {
      background: #14532d;
    }

    .estado.error {
      background: #7f1d1d;
    }

    .estado.aviso {
      background: #78350f;
    }

  </style>

</head>

<body>

  <main class="contenedor">

    <section class="tarjeta">

      <h1>Escáner QR SIGEI</h1>

      <p class="subtitulo">
        Active la cámara y acerque el código QR institucional al recuadro.
      </p>

      <div
        id="datosSolicitud"
        class="datos"
      >
        Verificando acceso temporal...
      </div>

      <div id="lectorQr"></div>

      <button
        id="botonActivar"
        type="button"
      >
        Activar cámara
      </button>

      <div
        id="estadoEscaner"
        class="estado info"
      >
        Pulse “Activar cámara” para iniciar.
      </div>
      <div
  id="accionesFinales"
  class="acciones-finales"
>

  <button
    id="botonVolverPortal"
    class="boton-volver-portal"
    type="button"
  >
    Volver al portal
  </button>


  <button
    id="botonCerrarSesion"
    class="boton-cerrar-sesion"
    type="button"
  >
    Cerrar sesión
  </button>

</div>

    </section>

  </main>

  <script>

    let escanerQr = null;
    let escanerActivo = false;
    let qrProcesado = false;
    const URL_APPS_SCRIPT =
  "https://script.google.com/macros/s/AKfycbzt8cODEG3Yivg_-RT9CegcHFc3mpJGwX9aOnJQ1OIiqBQxfwAHtcwb3TljtxLQBdH0/exec";

    const parametros =
      new URLSearchParams(
        window.location.search
      );

    const tokenQr =
      String(
        parametros.get("token") || ""
      ).trim();

    const tipoRegistro =
      String(
        parametros.get("tipo") || ""
      )
        .trim()
        .toUpperCase();


    function mostrarEstado(
      mensaje,
      tipo
    ) {

      const elemento =
        document.getElementById(
          "estadoEscaner"
        );

      elemento.textContent =
        mensaje;

      elemento.className =
        "estado " + (tipo || "info");

    }


    function validarParametros() {

      const elemento =
        document.getElementById(
          "datosSolicitud"
        );

      if (!tokenQr) {

        elemento.innerHTML =
          "<strong>Error:</strong> no se recibió el token temporal.";

        mostrarEstado(
          "Enlace de acceso incompleto.",
          "error"
        );

        return false;

      }

      if (
        tipoRegistro !== "INGRESO" &&
        tipoRegistro !== "SALIDA"
      ) {

        elemento.innerHTML =
          "<strong>Error:</strong> el tipo de operación no es válido.";

        mostrarEstado(
          "Enlace de acceso inválido.",
          "error"
        );

        return false;

      }

      elemento.innerHTML =
        "<strong>Operación:</strong> " +
        tipoRegistro +
        "<br>" +
        "<strong>Acceso temporal:</strong> recibido";

      return true;

    }


    async function detenerEscaner() {

      if (!escanerQr) {
        escanerActivo = false;
        return;
      }

      try {

        if (escanerActivo) {
          await escanerQr.stop();
        }

      }
      catch (error) {

        console.warn(
          "No se pudo detener el escáner:",
          error
        );

      }

      try {

        await escanerQr.clear();

      }
      catch (error) {

        console.warn(
          "No se pudo limpiar el escáner:",
          error
        );

      }

      escanerQr = null;
      escanerActivo = false;

    }
    function mostrarAccionesFinales() {

  const acciones =
    document.getElementById(
      "accionesFinales"
    );

  const botonCerrarSesion =
    document.getElementById(
      "botonCerrarSesion"
    );

  if (
    !acciones ||
    !botonCerrarSesion
  ) {
    return;
  }

  if (
    tipoRegistro === "SALIDA"
  ) {

    botonCerrarSesion.style.display =
      "block";

  }
  else {

    botonCerrarSesion.style.display =
      "none";

  }

  acciones.classList.add(
    "visible"
  );

}


function volverAlPortal() {

  window.close();

}


function solicitarCierreSesion() {

  const botonCerrarSesion =
    document.getElementById(
      "botonCerrarSesion"
    );

  if (botonCerrarSesion) {

    botonCerrarSesion.disabled =
      true;

    botonCerrarSesion.textContent =
      "Cerrando sesión...";

  }


  if (
    window.opener &&
    !window.opener.closed
  ) {

    window.opener.postMessage(

      {
        origen:
          "SIGEI_ESCANER_QR",

        accion:
          "cerrarSesion"
      },

      "https://script.google.com"

    );

    window.setTimeout(

      function() {

        window.close();

      },

      700

    );

    return;

  }


  mostrarEstado(
    "No fue posible comunicarse con el portal. Regrese al portal para cerrar la sesión.",
    "error"
  );


  if (botonCerrarSesion) {

    botonCerrarSesion.disabled =
      false;

    botonCerrarSesion.textContent =
      "Cerrar sesión";

  }

}


async function procesarQrDetectado(
  contenidoQr
) {

  contenidoQr =
    String(
      contenidoQr || ""
    ).trim();


  if (
    !contenidoQr ||
    qrProcesado
  ) {

    return;

  }


  qrProcesado = true;


  mostrarEstado(
    "QR detectado. Confirmando asistencia...",
    "aviso"
  );


  await detenerEscaner();


  try {

    const datosEnvio =
      new URLSearchParams();


    datosEnvio.append(
      "accion",
      "registrar_asistencia_qr"
    );


    datosEnvio.append(
      "tokenQr",
      tokenQr
    );


    datosEnvio.append(
      "tipo",
      tipoRegistro
    );


    datosEnvio.append(
      "contenidoQr",
      contenidoQr
    );


    const respuesta =
      await fetch(

        URL_APPS_SCRIPT,

        {
          method: "POST",

          headers: {
            "Content-Type":
              "application/x-www-form-urlencoded;charset=UTF-8"
          },

          body:
            datosEnvio.toString(),

          redirect:
            "follow"
        }

      );


    if (!respuesta.ok) {

      throw new Error(
        "El servidor respondió con estado " +
        respuesta.status +
        "."
      );

    }


    const textoRespuesta =
      await respuesta.text();


    let resultado;


    try {

      resultado =
        JSON.parse(
          textoRespuesta
        );

    }
    catch (error) {

      throw new Error(
        "La respuesta del servidor no es válida."
      );

    }


    if (
      !resultado ||
      !resultado.valido
    ) {

      mostrarEstado(

        resultado &&
        resultado.mensaje

          ? resultado.mensaje

          : "No fue posible registrar la asistencia.",

        "error"

      );

      return;

    }


    mostrarEstado(

      resultado.mensaje ||
      (
        tipoRegistro === "INGRESO"

          ? "Ingreso registrado correctamente."

          : "Salida registrada correctamente."
      ),

      "exito"

    );
    mostrarAccionesFinales();

  }
  catch (error) {

    console.error(
      "Error al enviar el registro:",
      error
    );


    mostrarEstado(

      "No fue posible comunicarse con SIGEI: " +
      (
        error &&
        error.message

          ? error.message

          : String(error)
      ),

      "error"

    );

  }

}


    async function iniciarEscaner() {

      const boton =
        document.getElementById(
          "botonActivar"
        );

      if (!validarParametros()) {
        return;
      }

      boton.disabled = true;
      qrProcesado = false;

      mostrarEstado(
        "Solicitando permiso para usar la cámara...",
        "aviso"
      );

      try {

        await detenerEscaner();

        escanerQr =
          new Html5Qrcode(
            "lectorQr"
          );

        await escanerQr.start(

          {
  facingMode: "environment"
},

          {
            fps: 10,

            qrbox: function(
              ancho,
              alto
            ) {

              const lado =
                Math.floor(
                  Math.min(
                    ancho,
                    alto
                  ) * 0.72
                );

              return {
                width: lado,
                height: lado
              };

            },

            aspectRatio: 1
          },

          procesarQrDetectado,

          function() {
            // Los intentos sin lectura son normales.
          }

        );

        escanerActivo = true;

        mostrarEstado(
          "Cámara activa. Acerque el QR al recuadro.",
          "exito"
        );

      }
      catch (error) {

        console.error(
          "Error al iniciar la cámara:",
          error
        );

        mostrarEstado(
          "No se pudo activar la cámara: " +
          (
            error &&
            error.message
              ? error.message
              : String(error)
          ),
          "error"
        );

        boton.disabled = false;

      }

    }


    document
      .getElementById(
        "botonActivar"
      )
      .addEventListener(
        "click",
        iniciarEscaner
      );

    document
  .getElementById(
    "botonVolverPortal"
  )
  .addEventListener(
    "click",
    volverAlPortal
  );


document
  .getElementById(
    "botonCerrarSesion"
  )
  .addEventListener(
    "click",
    solicitarCierreSesion
  );


    window.addEventListener(
      "beforeunload",
      detenerEscaner
    );


    const parametrosValidos =
      validarParametros();


    if (!parametrosValidos) {

      document
        .getElementById(
          "botonActivar"
        )
        .disabled = true;

    }

  </script>

</body>

</html>
